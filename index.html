  cursor:pointer;

</style>

<!-- VIDEO SCRIPT -->
<script>
const video = document.getElementById('maVideo');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) video.play().catch(() => {});
    else video.pause();
  });
});
observer.observe(video);
</script>
